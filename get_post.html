<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP GET vs POST Animator</title>
  <!-- Load React, Babel for JSX parsing, and Tailwind CSS via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // SVG Icons
    const Eye = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
    const HelpCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
    const GraduationCap = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
    const Search = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const PlusCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>;
    const Server = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6"><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></svg>;
    const CheckCircle2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-emerald-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const XCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-red-500"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>;
    const AlertCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;

    const App = () => {
      const [activeTab, setActiveTab] = useState('visualizer');
      const [method, setMethod] = useState('GET');
      const [step, setStep] = useState(0); 
      const [isAnimating, setIsAnimating] = useState(false);
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [quizFeedback, setQuizFeedback] = useState(null);
      
      const [blanks, setBlanks] = useState({});
      const [blankResults, setBlankResults] = useState({});

      const scenarios = {
        GET: {
          title: "Television Search",
          fields: [{ label: "Brand", name: "brand", value: "Samsung" }, { label: "Type", name: "type", value: "OLED" }],
          queryString: "?brand=Samsung&type=OLED",
          serverAction: "Searching database...",
          result: "5 results found (No data changed).",
          benefits: ["Bookmarkable URLs", "Cachable: Faster loading", "Visible parameters for easy sharing"],
          drawbacks: ["Insecure: Data visible in URL", "Limited size (~2048 chars)", "Supports text only"]
        },
        POST: {
          title: "Flight Booking",
          fields: [{ label: "User", name: "user", value: "Summie" }, { label: "Flight", name: "flight", value: "EC872" }],
          queryString: "",
          serverAction: "Adding record to database...",
          result: "Booking confirmed (Database updated!)",
          benefits: ["Secure: Data hidden in Body", "Unlimited data size", "Supports binary (images/files)"],
          drawbacks: ["Not Bookmarkable", "Not Cachable", "Browser 'Resubmit' warnings"]
        }
      };

      const questions = [
        { 
          text: "Filtering a list of products by price?", 
          answer: "GET", 
          explanation: "Only data retrieval is required and the data passed to server is not sensitive." 
        },
        { 
          text: "Uploading a profile picture file?", 
          answer: "POST", 
          explanation: "GET can only work with text. POST can work with text and binary data such as images and files." 
        },
        { 
          text: "Processing a credit card payment?", 
          answer: "POST", 
          explanation: "Sensitive data like credit cards should always be sent via POST to avoid URL exposure." 
        }
      ];

      const comparisonRows = [
        {label: 'Main Purpose', id1: 'getPurpose', id2: 'postPurpose', hint: 'Retrieve / Modify', correct1: 'Retrieve', correct2: 'Modify', explain: 'GET is for fetching data; POST is for changing data on the server.'},
        {label: 'Security', id1: 'getSecurity', id2: 'postSecurity', hint: 'Low / High', correct1: 'Low', correct2: 'High', explain: 'GET exposes data in the URL; POST hides it in the request body.'},
        {label: 'Data Type', id1: 'getType', id2: 'postType', hint: 'Text / Binary', correct1: 'Text', correct2: 'Binary', explain: 'GET only supports ASCII text; POST supports binary data like images.'},
        {label: 'Location', id1: 'getLocation', id2: 'postLocation', hint: 'URL / Body', correct1: 'URL', correct2: 'Body', explain: 'GET parameters are in the URL; POST parameters are in the HTTP body.'},
        {label: 'Cachable', id1: 'getCaching', id2: 'postCaching', hint: 'Yes / No', correct1: 'Yes', correct2: 'No', explain: 'GET requests are idempotent and can be cached; POST should never be cached.'}
      ];

      useEffect(() => {
        if (isAnimating) {
          const timer = setTimeout(() => {
            if (step < 3) setStep(s => s + 1);
            else setIsAnimating(false);
          }, 2000);
          return () => clearTimeout(timer);
        }
      }, [isAnimating, step]);

      const handleQuizAnswer = (selected) => {
        const isCorrect = selected === questions[currentQuestion].answer;
        setQuizFeedback(isCorrect ? 'correct' : 'incorrect');
        
        setTimeout(() => {
          setQuizFeedback(null);
          if (currentQuestion < questions.length - 1) {
            setCurrentQuestion(s => s + 1);
          } else {
            setActiveTab('fillBlanks');
          }
        }, 4000); 
      };

      const checkBlanks = () => {
        const results = {};
        comparisonRows.forEach(row => {
          const val1 = (blanks[row.id1] || '').toLowerCase().trim();
          const val2 = (blanks[row.id2] || '').toLowerCase().trim();
          
          results[row.id1] = val1.includes(row.correct1.toLowerCase());
          results[row.id2] = val2.includes(row.correct2.toLowerCase());
        });
        setBlankResults(results);
      };

      const currentScenario = scenarios[method];

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
          <div className="max-w-6xl mx-auto">
            {/* Header / Tabs */}
            <div className="flex justify-center mb-8">
              <div className="flex bg-slate-200/50 p-1 rounded-2xl border border-slate-200">
                <button onClick={() => setActiveTab('visualizer')} className={`px-6 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all ${activeTab === 'visualizer' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}><Eye /> Visualizer</button>
                <button onClick={() => setActiveTab('quiz')} className={`px-6 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all ${activeTab === 'quiz' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}><HelpCircle /> Scenario Quiz</button>
                <button onClick={() => setActiveTab('fillBlanks')} className={`px-6 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all ${activeTab === 'fillBlanks' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}><GraduationCap /> Comparison</button>
              </div>
            </div>

            {activeTab === 'visualizer' && (
              <div className="animate-in fade-in duration-500">
                <header className="mb-8 text-center">
                  <h1 className="text-3xl font-bold text-slate-900 mb-2">GET vs POST Visualizer</h1>
                  <p className="text-slate-600">See how form data is submitted to the server</p>
                </header>

                <div className="flex justify-center gap-4 mb-8">
                  <div className="flex bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200">
                    <button onClick={() => { setMethod('GET'); setStep(0); setIsAnimating(false); }} className={`px-8 py-3 rounded-xl font-bold transition-all flex items-center gap-2 ${method === 'GET' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}><Search /> GET</button>
                    <button onClick={() => { setMethod('POST'); setStep(0); setIsAnimating(false); }} className={`px-8 py-3 rounded-xl font-bold transition-all flex items-center gap-2 ${method === 'POST' ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}`}><PlusCircle /> POST</button>
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch mb-8">
                  <div className="lg:col-span-4 bg-white rounded-3xl shadow-xl border border-slate-200 p-6">
                    <h3 className="text-lg font-bold text-slate-800 mb-4">{currentScenario.title} Form</h3>
                    {currentScenario.fields.map((f) => (
                      <div key={f.name} className="mb-4">
                        <label className="block text-xs font-bold text-slate-500 mb-1 uppercase">{f.label}</label>
                        <input type="text" readOnly value={f.value} className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm" />
                      </div>
                    ))}
                    <button onClick={() => { setStep(0); setIsAnimating(true); }} className={`w-full py-3 rounded-xl font-bold text-white transition-all transform active:scale-95 ${method === 'GET' ? 'bg-blue-600' : 'bg-emerald-600'}`}>Send Request</button>
                  </div>

                  <div className="lg:col-span-4 flex flex-col items-center justify-center min-h-[300px] relative">
                    <div className="w-full h-px bg-slate-300 absolute top-1/2 left-0 z-0 border-dashed border-t-2" />
                    {step >= 1 && (
                      <div className="z-10 bg-slate-800 text-white rounded-xl shadow-2xl border-4 border-slate-700 p-4 font-mono text-[10px] md:text-xs max-w-full overflow-hidden">
                        <div className="text-pink-400 font-bold mb-1">{method} /action.php<span className="text-yellow-300 break-all">{method === 'GET' ? currentScenario.queryString : ''}</span></div>
                        {method === 'POST' && <div className="mt-4 pt-2 border-t border-slate-600 text-emerald-400 italic">Payload: {currentScenario.fields.map(f=>f.name+'='+f.value).join('&')}</div>}
                      </div>
                    )}
                  </div>

                  <div className="lg:col-span-4 bg-slate-900 rounded-3xl shadow-xl p-6 text-white border-t-4 border-emerald-500">
                    <div className="flex items-center gap-2 text-emerald-400 mb-6 font-bold uppercase tracking-widest text-sm"><Server /> Server Log</div>
                    <div className="bg-slate-800 rounded-2xl p-4 border border-slate-700 h-48 overflow-auto">
                       {step >= 2 ? (
                         <div className="text-sm">
                            <div className="flex items-center gap-2 mb-3"><div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" />{currentScenario.serverAction}</div>
                            {step === 3 && <div className="p-3 bg-emerald-500/10 border border-emerald-500/30 rounded text-xs text-slate-200">{currentScenario.result}</div>}
                         </div>
                       ) : <div className="text-slate-600 italic text-xs text-center pt-12">Awaiting connection...</div>}
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
                  <div className="bg-emerald-50 border border-emerald-100 rounded-3xl p-6 shadow-sm">
                    <h3 className="text-lg font-bold text-emerald-900 flex items-center gap-2 mb-4">
                      <CheckCircle2 /> Benefits of {method}
                    </h3>
                    <ul className="space-y-3">
                      {currentScenario.benefits.map((b, i) => (
                        <li key={i} className="text-sm text-emerald-800 flex gap-3">
                          <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 mt-2 shrink-0" /> {b}
                        </li>
                      ))}
                    </ul>
                  </div>
                  <div className="bg-red-50 border border-red-100 rounded-3xl p-6 shadow-sm">
                    <h3 className="text-lg font-bold text-red-900 flex items-center gap-2 mb-4">
                      <XCircle /> Drawbacks of {method}
                    </h3>
                    <ul className="space-y-3">
                      {currentScenario.drawbacks.map((d, i) => (
                        <li key={i} className="text-sm text-red-800 flex gap-3">
                          <div className="w-1.5 h-1.5 rounded-full bg-red-400 mt-2 shrink-0" /> {d}
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'quiz' && (
              <div className="max-w-2xl mx-auto py-12 bg-white rounded-3xl shadow-xl border border-slate-200 p-8">
                <div className="mb-4 text-xs font-bold text-blue-600 uppercase tracking-widest">Case Study {currentQuestion + 1} / {questions.length}</div>
                <h2 className="text-2xl font-bold mb-6 text-slate-800">{questions[currentQuestion].text}</h2>
                <div className="space-y-4">
                  {['GET', 'POST'].map(ans => (
                    <button key={ans} onClick={() => handleQuizAnswer(ans)} className="w-full p-6 rounded-2xl border-2 border-slate-100 hover:border-blue-500 hover:bg-blue-50 text-left font-bold text-xl transition-all">Select {ans}</button>
                  ))}
                </div>
                {quizFeedback && (
                  <div className={`mt-8 p-6 rounded-2xl border-l-8 animate-in slide-in-from-bottom-4 duration-300 ${quizFeedback === 'correct' ? 'bg-emerald-50 border-emerald-500 text-emerald-900' : 'bg-red-50 border-red-500 text-red-900'}`}>
                    <div className="flex items-center gap-2 font-bold mb-2">
                      {quizFeedback === 'correct' ? <CheckCircle2 /> : <XCircle />}
                      {quizFeedback === 'correct' ? 'Correct!' : 'Incorrect'}
                    </div>
                    <p className="text-sm font-medium">{questions[currentQuestion].explanation}</p>
                  </div>
                )}
              </div>
            )}

            {activeTab === 'fillBlanks' && (
              <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-200 max-w-4xl mx-auto">
                <div className="text-center mb-8">
                  <h2 className="text-2xl font-bold mb-2">Technical Comparison Summary</h2>
                  <p className="text-slate-500 text-sm italic">Type the technical term for each feature and click validate.</p>
                </div>
                
                <div className="overflow-x-auto">
                  <table className="w-full text-sm border-separate border-spacing-x-2 border-spacing-y-4">
                    <thead>
                      <tr className="text-slate-400 uppercase text-xs font-bold">
                        <th className="text-left p-2">Feature</th>
                        <th className="p-2 bg-blue-50 text-blue-800 rounded-t-xl text-center">GET Method</th>
                        <th className="p-2 bg-emerald-50 text-emerald-800 rounded-t-xl text-center">POST Method</th>
                      </tr>
                    </thead>
                    <tbody>
                      {comparisonRows.map(row => (
                        <React.Fragment key={row.label}>
                          <tr className="align-middle">
                            <td className="font-bold p-3 text-slate-700 w-1/4">{row.label}</td>
                            <td className="w-1/3">
                              <input 
                                value={blanks[row.id1] || ''} 
                                onChange={e => setBlanks({...blanks, [row.id1]: e.target.value})} 
                                className={`w-full p-3 border-2 rounded-xl text-center transition-all focus:outline-none
                                  ${blankResults[row.id1] === true ? 'border-emerald-500 bg-emerald-50' : 
                                    blankResults[row.id1] === false ? 'border-red-500 bg-red-100 text-red-700 font-bold' : 'border-slate-200 focus:border-blue-500'}`} 
                                placeholder={row.hint}
                              />
                            </td>
                            <td className="w-1/3">
                              <input 
                                value={blanks[row.id2] || ''} 
                                onChange={e => setBlanks({...blanks, [row.id2]: e.target.value})} 
                                className={`w-full p-3 border-2 rounded-xl text-center transition-all focus:outline-none
                                  ${blankResults[row.id2] === true ? 'border-emerald-500 bg-emerald-50' : 
                                    blankResults[row.id2] === false ? 'border-red-500 bg-red-100 text-red-700 font-bold' : 'border-slate-200 focus:border-emerald-500'}`} 
                                placeholder={row.hint}
                              />
                            </td>
                          </tr>
                          {(blankResults[row.id1] === false || blankResults[row.id2] === false) && (
                            <tr>
                              <td colSpan="3" className="p-0">
                                <div className="mx-2 mb-2 p-3 bg-red-50 border border-red-200 rounded-xl text-red-800 text-xs flex gap-2 items-start animate-in fade-in slide-in-from-top-1">
                                  <AlertCircle />
                                  <span><strong>Explanation:</strong> {row.explain}</span>
                                </div>
                              </td>
                            </tr>
                          )}
                        </React.Fragment>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="mt-8 flex justify-center gap-4">
                  <button onClick={checkBlanks} className="px-10 py-4 bg-slate-900 text-white font-bold rounded-2xl hover:bg-slate-800 transition-all shadow-lg active:scale-95">Validate Table</button>
                  <button onClick={() => { setBlanks({}); setBlankResults({}); }} className="px-6 py-4 bg-slate-200 text-slate-600 font-bold rounded-2xl hover:bg-slate-300 transition-all">Reset</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
